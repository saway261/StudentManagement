<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>受講生登録</title>
</head>
<body>
<h1>受講生登録</h1>

<form th:action="@{/registerStudent}" th:object="${studentDetail}" method="post">
  <div>
    <label for="fullname">フルネーム</label>
    <input type="text" id="fullname" th:field="*{student.fullname}" required/>
  </div>
  <div>
    <label for="kanaName">ふりがな</label>
    <input type="text" id="kanaName" th:field="*{student.kanaName}" required/>
  </div>
  <div>
    <label for="nickname">ニックネーム</label>
    <input type="text" id="nickname" th:field="*{student.nickname}" required/>
  </div>
  <div>
    <label for="email">Emailアドレス</label>
    <input type="email" id="email" th:field="*{student.email}" required/>
  </div>
  <div>
    <label for="city">地域</label>
    <input type="text" id="city" th:field="*{student.city}" required/>
  </div>
  <div>
    <label for="telephone">電話番号</label>
    <input type="tel" id="telephone" th:field="*{student.telephone}" required/>
  </div>
  <div>
    <label for="age">年齢</label>
    <input type="number" id="age" th:field="*{student.age}" required/>
  </div>
  <div>
    <label for="gender">性別(男・女・その他)</label>
    <input type="text" id="gender" th:field="*{student.gender}" required/>
  </div>
  <div>
    <label for="remark">備考</label>
    <input type="text" id="remark" th:field="*{student.remark}">
  </div>
  <div>
    <label for="course">コース</label>
    <input type="text" id="course" th:field="*{studentsCourses.courseName}" required/>
  </div>
  <div>
    <label for="courseStartAt">受講開始日</label>
    <input type="date" id="courseStartAt" th:field="*{studentsCourses.courseStartAt}" required/>
  </div>
  <div>
    <label for="courseEndAt">受講終了予定日</label>
    <input type="date" id="courseEndAt" th:field="*{studentsCourses.courseEndAt}">
  </div>

  <div>
    <button type="submit">登録</button>
  </div>
</form>

</body>
</html>
